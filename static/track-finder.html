<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASC 온보딩 — 나에게 맞는 트랙 찾기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --navy-900:#1a2a4a; --navy-950:#102a43; --heading:#0A0E1A;
    --brand-50:#EEF4FF; --brand-100:#DCE8FE; --brand-200:#B8D2FD;
    --brand-500:#477FE9; --brand-600:#2F62CC; --brand-700:#254FA8;
    --cream-50:#faf8f5; --cream-100:#f5f2ed; --cream-200:#ebe6de;
    --body:#4B5563; --sub:#6B7280; --line:#e7e2d9;
    --shadow:0 20px 45px -20px rgba(16,42,67,.22); --shadow-sm:0 6px 20px -12px rgba(16,42,67,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo',system-ui,-apple-system,sans-serif;
    background:var(--cream-50); color:var(--body);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:28px 22px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:560px}
  .eyebrow{font-size:12px;font-weight:800;letter-spacing:.14em;color:var(--brand-500);text-transform:uppercase;margin-bottom:14px}
  .progress{height:6px;background:var(--cream-200);border-radius:99px;overflow:hidden;margin-bottom:30px}
  .progress > i{display:block;height:100%;width:0;background:var(--brand-500);border-radius:99px;transition:width .4s ease}
  .progress.hidden{visibility:hidden}
  .q-count{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:10px}
  h1{font-size:34px;font-weight:900;letter-spacing:-.03em;line-height:1.22;color:var(--navy-900);margin-bottom:16px}
  h2.q{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.35;color:var(--navy-900);margin-bottom:24px}
  .lead{color:var(--sub);font-size:16px;line-height:1.75;margin-bottom:14px}
  .note{background:var(--brand-50);border:1px solid var(--brand-100);border-radius:14px;padding:14px 16px;
    font-size:13.5px;color:var(--brand-700);line-height:1.6;margin-bottom:28px}
  .opt{
    display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;
    background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-sm);
    padding:16px 18px;margin-bottom:11px;color:var(--navy-900);font-size:15.5px;font-weight:600;
    transition:transform .12s ease, border-color .15s, background .15s;
  }
  .opt:hover{border-color:var(--brand-500);background:var(--brand-50)}
  .opt:active{transform:scale(.99)}
  .opt .em{font-size:20px;line-height:1}
  .btns{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
  .ghost{background:none;border:none;color:var(--sub);font-size:14px;font-weight:600;cursor:pointer;padding:8px 4px}
  .ghost:hover{color:var(--navy-900)}
  .cta{
    display:inline-flex;align-items:center;gap:6px;background:var(--brand-500);color:#fff;font-weight:700;font-size:16px;
    padding:16px 26px;border-radius:12px;text-decoration:none;border:none;cursor:pointer;
    box-shadow:0 12px 26px -12px rgba(71,127,233,.7);transition:background .15s, transform .12s;
  }
  .cta:hover{background:var(--brand-600)}
  .cta:active{transform:scale(.99)}
  .cta.full{width:100%;justify-content:center}
  /* result */
  .result-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:30px;margin-bottom:14px;box-shadow:var(--shadow)}
  .match{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:18px}
  .match b{color:var(--brand-500);font-size:16px}
  .match-bar{height:6px;background:var(--cream-200);border-radius:99px;margin-top:8px;overflow:hidden}
  .match-bar > i{display:block;height:100%;background:var(--brand-500);border-radius:99px;transition:width .6s ease}
  .typeline{font-size:15px;font-weight:800;color:var(--brand-700);margin-bottom:6px;letter-spacing:-.01em}
  .result-em{font-size:46px;line-height:1;margin-bottom:16px}
  .badge{display:inline-block;font-size:12px;font-weight:800;color:var(--brand-700);background:var(--brand-50);
    border:1px solid var(--brand-100);padding:5px 11px;border-radius:99px;margin-bottom:15px}
  .result-card h3{font-size:29px;font-weight:900;letter-spacing:-.02em;color:var(--navy-900);margin-bottom:6px}
  .result-card .tag{color:var(--sub);font-size:15px;font-weight:600;margin-bottom:16px}
  .result-card p.why{font-size:14.5px;color:var(--body);line-height:1.7}
  .sub-card{width:100%;text-align:left;cursor:pointer;font-family:inherit;
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);
    display:flex;gap:12px;align-items:center;margin-bottom:24px;transition:border-color .15s, background .15s, transform .12s}
  .sub-card:hover{border-color:var(--brand-500);background:var(--brand-50)}
  .sub-card:active{transform:scale(.99)}
  .sub-card .sub-cta{font-size:13px;font-weight:700;color:var(--brand-500);white-space:nowrap}
  .sub-card .em{font-size:26px}
  .sub-card .t{font-size:12px;font-weight:600;color:var(--sub);margin-bottom:2px}
  .sub-card .n{font-size:15px;font-weight:800;color:var(--navy-900)}
  .fade{animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .foot{margin-top:30px;font-size:12px;font-weight:600;color:#bcb4a7;text-align:center;letter-spacing:.02em}
  .welcome-em{font-size:40px;margin-bottom:18px}
</style>
</head>
<body>

/* ===== 상태 ===== */
let step = 0;               // 0..QUESTIONS.length-1
const answers = [];
const app = document.getElementById('app');
const bar = document.getElementById('bar');
const progWrap = document.getElementById('progWrap');

function setBar(){ bar.style.width = (step / QUESTIONS.length * 100) + '%'; }

/* 환영(온보딩) 화면 */
function renderWelcome(){
  progWrap.classList.add('hidden');
  app.innerHTML = `<div class="fade">
    <div class="eyebrow">Welcome to ASC</div>
    <div class="welcome-em">👋</div>
    <h1>ASC에 오신 것을<br/>진심으로 환영합니다.</h1>
    <p class="lead">
      합류를 축하드려요! 7개 트랙 중에서 <b style="color:var(--navy-900)">무엇부터 시작해야 할지</b> 막막하실 수 있어요.<br/>
      간단한 5가지 질문으로, 지금 여러분에게 <b style="color:var(--navy-900)">가장 잘 맞는 트랙</b>을 찾아드릴게요.
    </p>
    <div class="note">
      ⏱️ 1분이면 충분해요. 한 달에 하나씩, 1년이면 모든 트랙을 경험하게 되니 부담 갖지 않으셔도 돼요.
    </div>
    <button class="cta full" id="start">나에게 맞는 트랙 찾기 →</button>
  </div>`;
  document.getElementById('start').addEventListener('click',()=>{
    step=0; answers.length=0; progWrap.classList.remove('hidden'); renderQuestion();
  });
}

function renderQuestion(){
  setBar();
  const Q = QUESTIONS[step];
  let html = `<div class="fade">
    <div class="q-count">질문 ${step+1} / ${QUESTIONS.length}</div>
    <h2 class="q">${Q.q}</h2>`;
  Q.opts.forEach((o,i)=>{
    html += `<button class="opt" data-i="${i}"><span class="em">${o.em}</span><span>${o.t}</span></button>`;
  });
  html += `<div class="btns">
    <button class="ghost" id="back">← ${step===0?'처음으로':'이전'}</button>
  </div></div>`;
  app.innerHTML = html;
  app.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>choose(parseInt(btn.dataset.i)));
  });
  document.getElementById('back').addEventListener('click',goBack);
}

function choose(i){
  answers[step] = i;
  step++;
  if(step < QUESTIONS.length) renderQuestion();
  else renderResult();
}

function goBack(){
  if(step===0){ renderWelcome(); return; }
  step--;
  renderQuestion();
}

let topTwo = [];      // [1순위key, 2순위key]
let primaryIdx = 0;   // 현재 크게 보고 있는 트랙 (0 or 1)
let PCT = {};         // 트랙별 매칭률

function computeScores(){
  const total = {}, max = {};
  Object.keys(TRACKS).forEach(k=>{ total[k]=0; max[k]=0; });
  QUESTIONS.forEach((Q,qi)=>{
    // 이 문항이 각 트랙에 줄 수 있는 최대 점수(가장 잘 맞는 답 기준)
    const best = {};
    Q.opts.forEach(o=>{ for(const k in o.s){ if(o.s[k] > (best[k]||0)) best[k]=o.s[k]; } });
    for(const k in best) max[k]+=best[k];
    // 실제 선택 점수
    const ai = answers[qi]; if(ai==null) return;
    const s = Q.opts[ai].s; for(const k in s) total[k]+=s[k];
  });
  return { total, max };
}

function renderResult(){
  const { total, max } = computeScores();
  const ranked = Object.keys(TRACKS).sort((a,b)=>total[b]-total[a]);
  PCT = {};
  ranked.forEach(k=>{ PCT[k]=Math.max(48, Math.min(99, Math.round(total[k]/(max[k]||1)*100))); });
  topTwo = [ranked[0], ranked[1]];
  primaryIdx = 0;
  paintResult();
}

function paintResult(){
  bar.style.width='100%';
  const isTop = primaryIdx===0;
  const pk = topTwo[primaryIdx], ok = topTwo[primaryIdx===0?1:0];
  const primary = TRACKS[pk], other = TRACKS[ok];
  const pct = PCT[pk], opct = PCT[ok];
  app.innerHTML = `<div class="fade">
    <div class="eyebrow">Your Track</div>
    <h1 style="margin-bottom:20px">${isTop ? '당신에게 딱 맞는 트랙은' : '이 트랙도 잘 맞아요'}</h1>
    <div class="result-card">
      <div class="match">매칭률 <b>${pct}%</b><div class="match-bar"><i style="width:${pct}%"></i></div></div>
      <div class="result-em">${primary.em}</div>
      <span class="badge">${isTop?'추천 1순위':'추천 2순위'} · 4주 산출물 · ${primary.badge}</span>
      <div class="typeline">당신은 &lsquo;${primary.type}&rsquo; 타입</div>
      <h3>${primary.name}</h3>
      <div class="tag">${primary.tag}</div>
      <p class="why">${primary.why}</p>
    </div>
    <button class="sub-card" id="swap">
      <span class="em">${other.em}</span>
      <div style="flex:1"><div class="t">${isTop?`이 트랙도 잘 맞아요 · 매칭률 ${opct}%`:'추천 1순위 다시 보기'}</div><div class="n">${other.name} · ${other.tag}</div></div>
      <span class="sub-cta">자세히 →</span>
    </button>
    <button class="cta full" id="apply">${primary.name} 신청하기 →</button>
    <div class="btns" style="justify-content:center">
      <button class="ghost" id="restart">↺ 다시 테스트하기</button>
    </div>
  </div>`;
  document.getElementById('swap').addEventListener('click',()=>{
    primaryIdx = primaryIdx===0?1:0; paintResult();
  });
  document.getElementById('restart').addEventListener('click',renderWelcome);
  document.getElementById('apply').addEventListener('click',()=>{
    /* 트랙 신청 폼 (asc-track-bot: Discord 로그인 → apply form) */
    window.open('https://asc-track-bot.vercel.app/apply','_blank');
  });
}

renderWelcome();
</script>
</body>
</html>
