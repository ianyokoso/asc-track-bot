<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <!-- build: 2026-06-30-personal-dashboard-mockup-v1 -->
  <title>ASC 개인 대시보드 (목업)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // track-apply.html 과 동일한 테마 (asc-bot-admin-dashboard tailwind config)
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'sans-serif'],
          },
          colors: {
            canvas: '#FFFFFF', surface: '#F4F6F8', 'surface-2': '#EDEFF2',
            ink: '#141E3C', 'ink-muted': '#4B5563', 'ink-soft': '#9CA3AF',
            'border-hair': '#E5E7EB', 'border-strong': '#D1D5DB',
            navy: '#1E2A4A', 'navy-strong': '#141E3C', 'navy-soft': '#EEF0F6',
            ok: '#16A34A', bad: '#DC2626', warn: '#D97706',
          },
          borderRadius: { 'xs': '4px', 'sm': '6px', 'md': '8px', 'lg': '12px' },
          letterSpacing: { 'eyebrow': '0.14em' },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Pretendard Variable', Pretendard, sans-serif; }
    .eyebrow { letter-spacing: 0.14em; }
    .skeleton { background: linear-gradient(90deg,#EDEFF2 25%,#F4F6F8 37%,#EDEFF2 63%); background-size:400% 100%; animation: shimmer 1.4s ease infinite; }
    @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
  </style>
</head>
<body class="bg-surface text-ink min-h-screen">
  <!-- 목업 배지 -->
  <div class="w-full bg-navy-strong text-white text-[11px] tracking-eyebrow uppercase text-center py-1.5">
    Mockup Preview · 개인 대시보드 (test 모드 전용)
  </div>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <!-- 상단 헤더 -->
    <header class="flex items-center justify-between mb-6">
      <div>
        <p class="text-[11px] eyebrow uppercase text-ink-soft mb-0.5">ASC TRACK</p>
        <h1 class="text-xl font-bold text-ink" id="page-title">내 대시보드</h1>
      </div>
      <button id="btn-logout"
        class="hidden text-[13px] h-9 px-3 rounded-sm border border-border-strong text-ink-muted hover:bg-surface-2 transition">
        로그아웃
      </button>
    </header>

    <!-- OAuth 결과 배너 -->
    <div id="auth-banner" class="hidden mb-4 rounded-md px-4 py-3 text-[13px]"></div>

    <!-- 로딩 -->
    <section id="state-loading" class="space-y-3">
      <div class="skeleton h-24 rounded-lg"></div>
      <div class="skeleton h-32 rounded-lg"></div>
      <div class="skeleton h-32 rounded-lg"></div>
    </section>

    <!-- 비로그인 -->
    <section id="state-login" class="hidden">
      <div class="bg-canvas border border-border-hair rounded-lg p-8 text-center shadow-sm">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-navy-soft flex items-center justify-center">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1E2A4A" stroke-width="1.8"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <h2 class="text-lg font-semibold mb-1">로그인이 필요해요</h2>
        <p class="text-[13px] text-ink-muted mb-6 leading-relaxed">
          Discord 로그인 후 본인의 트랙 · 신청 현황 · 크리에이터 일정을<br/>한눈에 볼 수 있어요.
        </p>
        <a id="btn-login" href="#"
          class="inline-flex items-center gap-2 h-11 px-6 rounded-md bg-[#5865F2] hover:bg-[#4752C4] text-white text-[14px] font-medium transition">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4A19.8 19.8 0 0 0 15.4 3l-.2.5a18 18 0 0 1 4.3 1.3 16 16 0 0 0-14.9 0A18 18 0 0 1 8.8 3.5L8.6 3a19.8 19.8 0 0 0-4.9 1.4C.6 9 .1 13.5.3 17.9a20 20 0 0 0 6 3l.8-1.1c-.7-.3-1.4-.6-2-1l.5-.4a14.3 14.3 0 0 0 12.3 0l.5.4c-.6.4-1.3.7-2 1l.8 1.1a20 20 0 0 0 6-3c.3-5.1-.5-9.5-3.2-13.5ZM8.3 15.3c-1.2 0-2.1-1.1-2.1-2.4S7.1 10.5 8.3 10.5s2.1 1.1 2.1 2.4-.9 2.4-2.1 2.4Zm7.4 0c-1.2 0-2.1-1.1-2.1-2.4s.9-2.4 2.1-2.4 2.1 1.1 2.1 2.4-.9 2.4-2.1 2.4Z"/></svg>
          Discord 로 로그인
        </a>
        <p id="login-disabled-note" class="hidden text-[12px] text-bad mt-4"></p>
      </div>
    </section>

    <!-- 로그인됨: 대시보드 -->
    <section id="state-dashboard" class="hidden space-y-4">

      <!-- 프로필 카드 -->
      <div class="bg-canvas border border-border-hair rounded-lg p-5 shadow-sm flex items-center gap-4">
        <img id="p-avatar" src="" alt="" class="w-14 h-14 rounded-full bg-surface-2 object-cover" />
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p id="p-name" class="text-base font-semibold text-ink truncate">—</p>
            <span id="p-admin" class="hidden text-[10px] eyebrow uppercase bg-navy-strong text-white px-1.5 py-0.5 rounded-xs">Admin</span>
          </div>
          <p id="p-handle" class="text-[13px] text-ink-muted truncate">—</p>
          <p id="p-id" class="text-[11px] text-ink-soft mt-0.5">Discord ID —</p>
        </div>
      </div>

      <!-- 내 트랙 (노션 멤버 트랙 기준) -->
      <div class="bg-canvas border border-border-hair rounded-lg p-5 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <p class="text-[11px] eyebrow uppercase text-ink-soft">내 트랙</p>
          <span class="text-[10px] eyebrow uppercase text-ink-soft bg-surface-2 px-1.5 py-0.5 rounded-xs">내 배정 트랙</span>
        </div>
        <div id="p-tracks" class="flex flex-wrap gap-2">
          <span class="skeleton inline-block h-7 w-24 rounded-full"></span>
          <span class="skeleton inline-block h-7 w-20 rounded-full"></span>
        </div>
      </div>

      <!-- 내 트랙 공간 바로가기 (디스코드 채널 딥링크) -->
      <div id="card-spaces" class="hidden bg-canvas border border-border-hair rounded-lg p-5 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <p class="text-[11px] eyebrow uppercase text-ink-soft">내 트랙 공간 바로가기</p>
          <span class="text-[10px] eyebrow uppercase text-ink-soft bg-surface-2 px-1.5 py-0.5 rounded-xs">Discord</span>
        </div>
        <div id="p-spaces" class="space-y-4"></div>
      </div>

      <!-- 과제 제출 현황 (히트맵) -->
      <div id="card-submissions" class="hidden bg-canvas border border-border-hair rounded-lg p-5 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <p class="text-[11px] eyebrow uppercase text-ink-soft">과제 제출 현황</p>
          <span id="p-week-badge" class="text-[10px] eyebrow uppercase text-ink-soft bg-surface-2 px-1.5 py-0.5 rounded-xs"></span>
        </div>
        <div id="p-heatmaps" class="space-y-6"></div>
        <div class="mt-4 pt-3 border-t border-border-hair flex flex-wrap gap-x-4 gap-y-1 text-[11px] text-ink-soft">
          <span><span class="inline-block w-3 h-3 rounded-sm align-middle" style="background:#16A34A"></span> 제출</span>
          <span><span class="inline-block w-3 h-3 rounded-sm align-middle" style="background:#1E2A4A"></span> 오늘·이번주</span>
          <span><span class="inline-block w-3 h-3 rounded-sm align-middle" style="background:#FCA5A5"></span> 놓침</span>
          <span><span class="inline-block w-3 h-3 rounded-sm align-middle" style="background:#EDEFF2"></span> 예정</span>
        </div>
      </div>
      <div id="card-submissions-empty" class="hidden bg-canvas border border-border-hair rounded-lg p-5 shadow-sm">
        <p class="text-[11px] eyebrow uppercase text-ink-soft mb-2">과제 제출 현황</p>
        <p id="p-submissions-empty-msg" class="text-[13px] text-ink-soft"></p>
      </div>

      <p class="text-[11px] text-ink-soft text-center pt-2">
        데이터 출처: 디스코드 역할 · 과제 제출(Supabase 공유) · Notion 과제 DB
      </p>
    </section>
  </main>

  <script>
    // 이 페이지는 vercel `/static/*` rewrite 를 타고 Oracle:8001 이 서빙한다.
    // API 는 relative `/api/...` 로 호출 → vercel `/api/*` rewrite → Oracle (track-apply.html 과 동일 패턴).
    const SELF_PATH = '/static/personal-dashboard.html';
    const LOGIN_URL = `/api/auth/discord?next=${encodeURIComponent(SELF_PATH)}`;
    const $ = (id) => document.getElementById(id);

    function show(stateId) {
      ['state-loading', 'state-login', 'state-dashboard'].forEach(s => $(s).classList.toggle('hidden', s !== stateId));
    }

    function showBanner(kind) {
      const map = {
        success:        ['로그인되었습니다.', 'bg-ok/10 text-ok border border-ok/20'],
        error:          ['로그인 중 오류가 발생했어요. 다시 시도해 주세요.', 'bg-bad/10 text-bad border border-bad/20'],
        token_error:    ['로그인 토큰 처리에 실패했어요. 다시 시도해 주세요.', 'bg-bad/10 text-bad border border-bad/20'],
        callback_error: ['로그인 처리 중 오류가 발생했어요.', 'bg-bad/10 text-bad border border-bad/20'],
        invalid_state:  ['세션이 만료됐어요. 다시 로그인해 주세요.', 'bg-warn/10 text-warn border border-warn/20'],
        not_guild_member: ['ASC 디스코드 서버 멤버만 이용할 수 있어요.', 'bg-bad/10 text-bad border border-bad/20'],
        not_configured: ['로그인이 아직 설정되지 않았어요(관리자 확인 필요).', 'bg-warn/10 text-warn border border-warn/20'],
        disabled:       ['이 기능은 현재 비활성화되어 있어요.', 'bg-warn/10 text-warn border border-warn/20'],
      };
      const entry = map[kind];
      if (!entry) return;
      const el = $('auth-banner');
      el.textContent = entry[0];
      el.className = `mb-4 rounded-md px-4 py-3 text-[13px] ${entry[1]}`;
      el.classList.remove('hidden');
    }

    function fmtDate(s) {
      if (!s) return '';
      const d = new Date(s);
      if (isNaN(d)) return s;
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    function renderDashboard(data) {
      const user = data.user || {};
      const summary = data.summary || {};

      $('p-avatar').src = user.avatarUrl || `https://cdn.discordapp.com/embed/avatars/0.png`;
      $('p-name').textContent = user.displayName || user.username || '이름 없음';
      $('p-handle').textContent = user.username ? `@${user.username}` : '';
      $('p-id').textContent = `Discord ID ${user.id || '—'}`;
      if (data.isAdmin) $('p-admin').classList.remove('hidden');

      // 트랙 — 노션 멤버 트랙 기준 (비동기 로드)
      loadDiscordTracks();
      // 과제 제출 현황 히트맵 (비동기 로드)
      loadSubmissions();

      $('btn-logout').classList.remove('hidden');
      show('state-dashboard');
    }

    // ── 과제 제출 히트맵 ─────────────────────────────────────────
    const HEAT_COLOR = { done: '#16A34A', today: '#1E2A4A', current: '#1E2A4A', missed: '#FCA5A5', upcoming: '#EDEFF2' };
    const WD_LABEL = ['월', '화', '수', '목', '금'];

    function cell(state, title) {
      return `<span title="${escapeAttr(title || '')}" class="inline-block w-6 h-6 rounded-sm align-middle"
                    style="background:${HEAT_COLOR[state] || '#EDEFF2'}"></span>`;
    }

    function renderHeatmapGrid(g) {
      const head = `<div class="flex items-center justify-between mb-2">
          <p class="text-[13px] font-semibold text-ink">${escapeHtml(g.track)}</p>
          <span class="text-[12px] text-ink-muted">${g.submitted}/${g.total}</span>
        </div>`;
      if (g.cadence === 'daily') {
        const header = `<div class="flex gap-1.5 mb-1 pl-9">${WD_LABEL.map(d =>
          `<span class="inline-block w-6 text-center text-[11px] text-ink-soft">${d}</span>`).join('')}</div>`;
        const rows = g.rows.map(r =>
          `<div class="flex items-center gap-1.5 mb-1">
             <span class="w-8 text-[11px] text-ink-soft">${r.week}주</span>
             ${r.days.map(d => cell(d.state, `${d.date} (${WD_LABEL[d.wd]})`)).join('')}
           </div>`).join('');
        return `<div>${head}${header}${rows}</div>`;
      }
      // weekly: 4칸
      const cells = g.cells.map(c => `<div class="flex flex-col items-center gap-1">
          <span class="text-[11px] text-ink-soft">${c.week}주</span>${cell(c.state, `${c.week}주차`)}
        </div>`).join('');
      return `<div>${head}<div class="flex gap-3">${cells}</div>
        <p class="text-[11px] text-ink-soft mt-1.5">주 1회 제출</p></div>`;
    }

    async function loadSubmissions() {
      try {
        const res = await fetch('/api/auth/submissions', { credentials: 'include' });
        const data = await res.json();
        const card = $('card-submissions'), emptyCard = $('card-submissions-empty');

        if (!data.onboarded) {
          $('p-submissions-empty-msg').textContent = '아직 과제 제출 이력이 없어요. 기수가 시작되고 과제-인증 채널에 올리면 여기에 표시됩니다.';
          emptyCard.classList.remove('hidden');
          return;
        }
        if (!data.grids || !data.grids.length) {
          $('p-submissions-empty-msg').textContent = data.cohortStart
            ? '표시할 트랙 과제가 없어요.'
            : '기수 시작일이 설정되면 제출 현황이 표시됩니다.';
          emptyCard.classList.remove('hidden');
          return;
        }
        if (data.currentWeek) $('p-week-badge').textContent = `현재 ${data.currentWeek}주차`;
        $('p-heatmaps').innerHTML = data.grids.map(renderHeatmapGrid).join('');
        card.classList.remove('hidden');
      } catch (e) {
        console.error('submissions load failed', e);
      }
    }

    async function loadDiscordTracks() {
      const el = $('p-tracks');
      try {
        const res = await fetch('/api/auth/discord-tracks', { credentials: 'include' });
        const data = await res.json();
        const tracks = (data.tracks || []);
        if (tracks.length) {
          el.innerHTML = tracks.map(t => {
            const cohort = String(t.cohort || '');
            const cohortLabel = cohort ? (/기$/.test(cohort) ? cohort : cohort + '기') : '';
            return `<span class="inline-flex items-center gap-1.5 text-[13px] pl-3 pr-2 py-1 rounded-full bg-navy-soft text-navy-strong font-medium">
               ${escapeHtml(t.label || t.roleName || '트랙')}
               ${cohortLabel ? `<span class="text-[10px] text-navy bg-canvas px-1.5 py-0.5 rounded-full">${escapeHtml(cohortLabel)}</span>` : ''}
             </span>`;
          }).join('');
        } else {
          el.innerHTML = `<span class="text-[13px] text-ink-soft">등록된 트랙이 없어요.</span>`;
        }
        renderSpaces(data.spaces || []);
      } catch (e) {
        el.innerHTML = `<span class="text-[13px] text-bad">트랙 역할을 불러오지 못했어요.</span>`;
      }
    }

    function renderSpaces(spaces) {
      const card = $('card-spaces');
      const wrap = $('p-spaces');
      if (!spaces.length) { card.classList.add('hidden'); return; }
      wrap.innerHTML = spaces.map(sp => {
        const head = `${escapeHtml((sp.trackKey || sp.trackName).replace(/-/g, ' '))}${sp.cohort ? ' · ' + escapeHtml(sp.cohort) + (String(sp.cohort).match(/기$/) ? '' : '기') : ''}`;
        const btns = (sp.channels || []).map(c =>
          `<a href="${escapeAttr(c.url)}" target="_blank" rel="noopener"
              ${c.id ? `data-ch="${escapeAttr(c.id)}"` : ''}
              title="${escapeAttr(c.name)}"
              class="ch-link relative inline-flex items-center gap-1.5 h-9 px-3 rounded-md border border-border-strong text-[13px] text-ink hover:bg-surface-2 transition">
             <span>${c.emoji}</span><span>${escapeHtml(c.label)}</span>
             ${c.id ? `<span class="ch-badge hidden absolute -top-1.5 -right-1.5 min-w-[18px] h-[18px] px-1 rounded-full bg-bad text-white text-[10px] font-bold leading-[18px] text-center"></span>` : ''}
           </a>`
        ).join('');
        return `<div>
          <p class="text-[13px] font-semibold text-ink mb-2">${head}</p>
          <div class="flex flex-wrap gap-3">${btns}</div>
        </div>`;
      }).join('');
      card.classList.remove('hidden');
      wireChannelBadges();
      loadChannelActivity();
    }

    // 클릭 시 last-seen 갱신 + 뱃지 즉시 제거 (디스코드 unread 방식)
    function wireChannelBadges() {
      $('p-spaces').querySelectorAll('a.ch-link[data-ch]').forEach(a => {
        a.addEventListener('click', () => {
          const badge = a.querySelector('.ch-badge');
          if (badge) badge.classList.add('hidden');
          const cid = a.getAttribute('data-ch');
          try {
            fetch('/api/auth/channel-seen', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ channelId: cid }),
              keepalive: true,
            });
          } catch (e) {}
        });
      });
    }

    async function loadChannelActivity() {
      try {
        const res = await fetch('/api/auth/channel-activity', { credentials: 'include' });
        if (!res.ok) return;
        const data = await res.json();
        const act = data.activity || {};
        $('p-spaces').querySelectorAll('a.ch-link[data-ch]').forEach(a => {
          const cid = a.getAttribute('data-ch');
          const n = act[cid] || 0;
          const badge = a.querySelector('.ch-badge');
          if (badge && n > 0) {
            badge.textContent = n > 99 ? '99+' : String(n);
            badge.classList.remove('hidden');
          }
        });
      } catch (e) { /* 조용히 무시 */ }
    }

    function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escapeAttr(s){ return escapeHtml(s).replace(/`/g,'&#96;'); }

    async function init() {
      const params = new URLSearchParams(location.search);
      if (params.get('discord_auth')) {
        showBanner(params.get('discord_auth'));
        // 주소창에서 쿼리 제거 (새로고침 시 배너 반복 방지)
        history.replaceState(null, '', SELF_PATH);
      }

      $('btn-login').href = LOGIN_URL;
      $('btn-logout').addEventListener('click', async () => {
        try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch (e) {}
        location.href = SELF_PATH;
      });

      try {
        const res = await fetch(`/api/auth/me?next=${encodeURIComponent(SELF_PATH)}`, { credentials: 'include' });
        const data = await res.json();

        if (res.status === 403 || data.featureEnabled === false) {
          $('login-disabled-note').textContent = data.message || '이 기능은 test 모드에서만 사용할 수 있어요.';
          $('login-disabled-note').classList.remove('hidden');
          $('btn-login').classList.add('opacity-40', 'pointer-events-none');
          show('state-login');
          return;
        }

        if (!data.authenticated) {
          if (data.loginUrl) $('btn-login').href = data.loginUrl;
          show('state-login');
          return;
        }

        renderDashboard(data);
      } catch (e) {
        console.error('auth/me failed', e);
        show('state-login');
      }
    }

    init();
  </script>
</body>
</html>
